# Vero Capital Holdings — Daily Pipeline Refresh & Dashboard Deploy
#
# Runs at 6:00 AM EST (11:00 UTC) every weekday. Can also be triggered manually.
# Fetches fresh data, re-runs analysis pipeline, regenerates static dashboard,
# and pushes docs/ updates to main so GitHub Pages redeploys.

name: Daily Pipeline Refresh

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      capital:
        description: 'Capital budget ($)'
        required: false
        default: '350000'

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure API keys
        run: |
          cat > .env << EOF
          BLS_API_KEY=${{ secrets.BLS_API_KEY }}
          FRED_API_KEY=${{ secrets.FRED_API_KEY }}
          CENSUS_API_KEY=${{ secrets.CENSUS_API_KEY }}
          EOF
          echo "API key lengths:"
          echo "  BLS: $(echo -n '${{ secrets.BLS_API_KEY }}' | wc -c)"
          echo "  FRED: $(echo -n '${{ secrets.FRED_API_KEY }}' | wc -c)"

      - name: Run full pipeline
        env:
          CAPITAL: ${{ github.event.inputs.capital || '350000' }}
        run: python -m src.main --run full --capital $CAPITAL

      - name: Rebuild static dashboard
        run: |
          python scripts/generate_html.py
          ls -la docs/index.html

      - name: Write refresh timestamp
        run: |
          python3 <<'PYEOF'
          import json
          from datetime import datetime, timezone
          meta = {
              "last_refresh": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "triggered_by": "${{ github.event_name }}",
              "capital": int("${{ github.event.inputs.capital || '350000' }}"),
              "status": "success",
          }
          with open("docs/refresh_meta.json", "w") as f:
              json.dump(meta, f, indent=2)
          print("Refresh meta written:", meta)
          PYEOF

      - name: Show what changed
        run: |
          git status
          echo "---"
          git diff --stat

      - name: Commit and push to main
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Only add docs/ — outputs/ is gitignored so skip it
          git add -A docs/

          if git diff --staged --quiet; then
            echo "No changes in docs/ — nothing to commit"
            exit 0
          fi

          git commit -m "Daily refresh: $(date -u +%Y-%m-%d) [skip ci]"

          # Push with retry — handles races with other commits
          for attempt in 1 2 3; do
            echo "Push attempt $attempt..."
            if git push origin main; then
              echo "Push succeeded"
              exit 0
            fi
            echo "Push failed, pulling and retrying..."
            git pull --rebase origin main || {
              echo "Rebase failed, aborting"
              git rebase --abort || true
              sleep 5
            }
          done

          echo "All push attempts failed"
          exit 1

      - name: Report status
        if: always()
        run: |
          echo "Workflow finished at $(date -u)"
          echo "Site URL: https://dashboardverocapitalholdings.com"
