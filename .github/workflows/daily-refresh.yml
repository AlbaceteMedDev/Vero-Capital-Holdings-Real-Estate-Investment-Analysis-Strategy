# Vero Capital Holdings — Daily Pipeline Refresh & Dashboard Deploy
#
# Runs at 6:00 AM EST (11:00 UTC) every weekday.
# Fetches fresh data from Census, BLS, FRED, and Zillow APIs,
# re-runs the full analysis pipeline, regenerates the static
# dashboard, and pushes updated docs/ to main for GitHub Pages.

name: Daily Pipeline Refresh

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      capital:
        description: 'Capital budget ($)'
        required: false
        default: '350000'

permissions:
  contents: write

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure API keys
        run: |
          cat > .env << EOF
          BLS_API_KEY=${{ secrets.BLS_API_KEY }}
          FRED_API_KEY=${{ secrets.FRED_API_KEY }}
          CENSUS_API_KEY=${{ secrets.CENSUS_API_KEY }}
          EOF

      - name: Run full pipeline
        env:
          CAPITAL: ${{ github.event.inputs.capital || '350000' }}
        run: |
          python -m src.main --run full --capital $CAPITAL

      - name: Rebuild static dashboard
        run: |
          python scripts/generate_html.py
          ls -la docs/index.html

      - name: Write refresh timestamp
        run: |
          python3 -c "
          import json
          from datetime import datetime
          meta = {
              'last_refresh': datetime.utcnow().isoformat() + 'Z',
              'triggered_by': '${{ github.event_name }}',
              'capital': int('${{ github.event.inputs.capital || '350000' }}'),
              'status': 'success',
          }
          with open('docs/refresh_meta.json', 'w') as f:
              json.dump(meta, f, indent=2)
          "

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ outputs/
          if git diff --staged --quiet; then
            echo "No data changes detected"
          else
            git commit -m "Daily refresh: $(date -u +%Y-%m-%d) pipeline data update"
            git push origin main
          fi
