# Vero Capital Holdings — Market Filtering Criteria
# Markets must pass these thresholds to enter the scoring pipeline

filters:
  # Population minimums
  min_msa_population: 100000
  min_population_growth_pct: 0.5   # YoY percent

  # Employment
  max_unemployment_rate: 6.0       # Percent
  min_job_growth_pct: 1.0          # Year-over-year percent

  # Housing
  max_median_home_price: 250000    # USD — stay within acquisition range
  min_median_home_price: 60000     # Avoid distressed/declining markets
  min_monthly_rent_to_price_pct: 0.7  # Monthly rent / price * 100 (cash flow viability)
  max_days_on_market: 90           # Market liquidity

  # Economic
  min_median_household_income: 40000

  # Geographic exclusions (optional)
  exclude_states: []
  include_states: []  # Empty = all states
