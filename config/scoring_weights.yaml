# Vero Capital Holdings — Market Scoring Weights
# Weights used to rank MSAs across investment dimensions (must sum to 1.0)

scoring:
  cap_rate:
    weight: 0.15
    column: cap_rate
    description: "Capitalization rate (NOI / price)"

  cash_on_cash:
    weight: 0.12
    column: cash_on_cash_return
    description: "Cash-on-cash return"

  irr_5yr:
    weight: 0.13
    column: irr_5yr
    description: "5-year IRR projection"

  rent_to_price:
    weight: 0.10
    column: monthly_rent_to_price_pct
    description: "Monthly rent-to-price ratio"

  dscr:
    weight: 0.08
    column: dscr
    description: "Debt service coverage ratio"

  landlord_friendliness:
    weight: 0.10
    column: landlord_friendliness_score
    description: "State landlord-friendliness (1-10)"

  diversification:
    weight: 0.08
    column: diversification_score
    description: "Employment diversification score"

  migration:
    weight: 0.08
    column: migration_score
    description: "Net domestic migration score"

  price_growth:
    weight: 0.08
    column: cagr_5yr
    description: "5-year price appreciation CAGR"

  rent_growth:
    weight: 0.08
    column: rent_growth_pct
    description: "Year-over-year rent growth"
